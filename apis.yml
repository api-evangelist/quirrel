aid: quirrel
name: Quirrel
description: >-
  Quirrel is an open source job queueing and workflow scheduling service designed
  for serverless and containerized JavaScript and TypeScript applications. It enables
  developers to enqueue, schedule, retry, and orchestrate background jobs in environments
  such as Next.js, Blitz.js, Redwood, Remix, SvelteKit, Nuxt.js, Express, Vercel,
  and Netlify Functions. Quirrel was acquired by Netlify in 2022 and remains available
  as an open source project.
