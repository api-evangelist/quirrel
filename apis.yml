apis:
  - aid: quirrel:quirrel
    name: Quirrel
    description: >-
      Quirrel provides a JavaScript and TypeScript SDK for enqueuing, scheduling, retrying,
      and managing background jobs in serverless and containerized applications. The
      Queue API exposes methods such as enqueue, enqueueMany, get, getById, invoke,
      and delete to manage job lifecycle and supports recurring jobs via cron expressions,
      delayed execution, exclusive jobs, and configurable retry policies. Quirrel is
      framework agnostic and integrates with Next.js, Redwood, Remix, SvelteKit, Nuxt.js,
      Blitz.js, Vercel, Netlify, and Express.
